name: Deploy Module and App
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Version tag (e.g. v0.0.21)
        required: true

permissions:
  contents: read

jobs:
  publish-module:
    runs-on: ubuntu-24.04
    steps:
      # actions/checkout@v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Build and upload to Viam Registry
        # viamrobotics/build-action@v1.7
        uses: viamrobotics/build-action@cd35d596eabba93e9b6776f708c54865ec1c8360
        with:
          version: ${{ inputs.version || github.ref_name }}
          ref: ${{ github.sha }}
          key-id: ${{ secrets.viam_key_id }}
          key-value: ${{ secrets.viam_key_secret }}
          token: ${{ github.token }}

  publish-app:
    runs-on: ubuntu-24.04
    steps:
      # actions/checkout@v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # actions/setup-node@v6.2.0
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web-app/package-lock.json

      - name: Build web app artifact
        run: make web-app-module

      - name: Upload to Viam Registry
        # viamrobotics/upload-module@v1.2
        uses: viamrobotics/upload-module@31b3909ba4d40f22a58c8479f3b4302538a5099b
        with:
          meta-path: web-app/meta.json
          module-path: web-app/module.tar.gz
          platform: any
          version: ${{ inputs.version || github.ref_name }}
          key-id: ${{ secrets.viam_key_id }}
          key-value: ${{ secrets.viam_key_secret }}
          do-update: ${{ github.event_name == 'workflow_dispatch' || !github.event.release.prerelease }}
          do-upload: true

  send-slack-msg:
    name: Send Slack Message
    needs: [publish-module, publish-app]
    runs-on: ubuntu-24.04
    if: always()
    steps:
      - name: Generate success value
        id: success-value
        run: |
          echo "result=${{ (needs.publish-module.result == 'success' && needs.publish-app.result == 'success') && 'success' || 'failure' }}" >> $GITHUB_OUTPUT

      - name: Send slack message
        # slackapi/slack-github-action@v2.1.1
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ secrets.SLACK_CHANNEL_ID }}",
              "text": "Deploy ${{ inputs.version || github.ref_name }} ${{ steps.success-value.outputs.result == 'success' && '*succeeded* :white_check_mark:' || '*failed* :x:'}}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ steps.success-value.outputs.result == 'success' && format('Deploy *{0}* *succeeded* :white_check_mark:\n\t<{1}/{2}/releases/tag/{0}|Release {0}>', inputs.version || github.ref_name, github.server_url, github.repository) || format('Deploy *{0}* *failed* :x:', inputs.version || github.ref_name) }}\n\tModule: ${{ needs.publish-module.result }}\n\tWeb app: ${{ needs.publish-app.result }}\n\t<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Workflow run>"
                  }
                }
              ]
            }
